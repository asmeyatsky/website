name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: website2-480712
  GCP_REGION: europe-west1
  SERVICE_NAME: website
  STAGING_SERVICE_NAME: website-staging
  ARTIFACT_REGISTRY_REPO: website
  IMAGE: europe-west1-docker.pkg.dev/website2-480712/website/website

jobs:
  build-and-deploy-staging:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -t ${IMAGE}:${{ github.sha }} \
            -t ${IMAGE}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${IMAGE}:${{ github.sha }}
          docker push ${IMAGE}:latest

      - name: Deploy to staging
        run: |
          gcloud run deploy ${STAGING_SERVICE_NAME} \
            --image=${IMAGE}:${{ github.sha }} \
            --region=${GCP_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --max-instances=1 \
            --timeout=60 \
            --service-account=website-sa@${PROJECT_ID}.iam.gserviceaccount.com \
            --project=${PROJECT_ID}

  deploy-production:
    needs: build-and-deploy-staging
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy to production
        run: |
          gcloud run deploy ${SERVICE_NAME} \
            --image=${IMAGE}:${{ github.sha }} \
            --region=${GCP_REGION} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --max-instances=10 \
            --timeout=60 \
            --service-account=website-sa@${PROJECT_ID}.iam.gserviceaccount.com \
            --project=${PROJECT_ID}
